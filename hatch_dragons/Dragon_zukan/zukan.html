<script>
  const buttons = document.querySelectorAll('.filter-btn');
  const dragons = document.querySelectorAll('.dragon');
  const searchBox = document.getElementById('searchBox');
  const searchButton = document.getElementById('searchButton');

  let activeFilters = [];

  // ボタン絞り込み
  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      const filter = btn.dataset.filter;

      if (activeFilters.includes(filter)) {
        activeFilters = activeFilters.filter(f => f !== filter);
        btn.classList.remove("active");
      } else {
        activeFilters.push(filter);
        btn.classList.add("active");
      }

      applyFilters();
    });
  });

  // 入力した瞬間にも検索（リアルタイム）
  searchBox.addEventListener('input', () => {
    applyFilters();
  });

  // 検索ボタンを押したときにも検索
  searchButton.addEventListener('click', () => {
    applyFilters();
  });

  // 絞り込み処理（ボタン＋検索）
  function applyFilters() {
    const keyword = searchBox.value.toLowerCase();

    dragons.forEach(dragon => {
      const tags = dragon.dataset.tags.split(" ");
      const name = dragon.dataset.name.toLowerCase();
      const desc = dragon.dataset.desc.toLowerCase();

      const matchFilter = activeFilters.every(f => tags.includes(f));
      const matchKeyword = name.includes(keyword) || desc.includes(keyword);

      dragon.style.display =
        (matchFilter || activeFilters.length === 0) && matchKeyword
          ? "block"
          : "none";
    });
  }
</script>
